[book]
title = "Notes"
authors = ["Shunya Sasaki"]
language = "en"

[build]
build-dir = ".book"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
theme = "../.assets/theme"
additional-js = [
    "../.third-party/js/mermaid.min.js",
    "../.third-party/js/mermaid-init.js",
    "../.third-party/js/iconify-icon.min.js",
    "../.third-party/js/mermaid-init.js",
    "../.assets/js/mermaid-register-icon-packs.js"
    ]
additional-css = ["../.assets/css/custom.css"]
